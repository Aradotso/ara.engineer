<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ae — Ara Engineer</title>
    <meta name="description" content="The ae CLI — worktrees, dev envs, and agent-friendly skills for Ara." />
    <meta property="og:title" content="ae — Ara Engineer" />
    <meta property="og:description" content="The ae CLI — worktrees, dev envs, and agent-friendly skills for Ara." />
    <meta property="og:image" content="https://ara.engineer/img2.png" />
    <meta property="og:url" content="https://ara.engineer" />
    <link rel="icon" href="/ara_logo.svg" />
    <link rel="preconnect" href="https://rsms.me/" crossorigin />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <style>
      :root {
        --bg: #0a0a0a;
        --fg: #ededed;
        --muted: #7a7a7a;
        --rule: #1c1c1c;
        --accent: #d96f5a;
        --sans: "Inter", "Inter var", system-ui, -apple-system, "Segoe UI", sans-serif;
        --mono: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
      }
      @supports (font-variation-settings: normal) {
        :root { --sans: "Inter var", "Inter", system-ui, -apple-system, sans-serif; }
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        background: var(--bg);
        color: var(--fg);
        font-family: var(--sans);
        font-size: 14px;
        line-height: 1.55;
        font-feature-settings: "cv11", "ss01", "ss03";
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      main {
        max-width: 520px;
        margin: 0 auto;
        padding: 72px 28px 96px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 40px;
      }
      .brand img { height: 20px; width: auto; display: block; filter: invert(93%); }
      .brand span {
        font-size: 13px;
        letter-spacing: 0.01em;
        color: var(--muted);
      }
      p { margin: 0 0 16px; color: var(--fg); }
      .intro { font-size: 15px; letter-spacing: -0.005em; }
      code {
        font-family: var(--mono);
        font-size: 0.92em;
        color: var(--fg);
      }
      .muted { color: var(--muted); font-size: 13px; }
      .install {
        position: relative;
        display: block;
        font-family: var(--mono);
        font-size: 13px;
        color: var(--fg);
        padding: 14px 16px 14px 18px;
        margin: 8px 0 20px;
        border: 1px solid var(--rule);
        border-left: 2px solid var(--accent);
        border-radius: 3px;
        background: #0f0f0f;
        white-space: nowrap;
        overflow-x: auto;
      }
      .install::before {
        content: "$ ";
        color: var(--muted);
        user-select: none;
      }
      .copy {
        position: absolute;
        right: 8px;
        top: 50%;
        transform: translateY(-50%);
        font-family: var(--sans);
        font-size: 11px;
        color: var(--muted);
        background: transparent;
        border: 1px solid var(--rule);
        border-radius: 3px;
        cursor: pointer;
        padding: 3px 7px;
      }
      .copy:hover { color: var(--fg); border-color: #333; }
      .copy.ok { color: var(--accent); border-color: var(--accent); }
      hr {
        border: none;
        border-top: 1px solid var(--rule);
        margin: 40px 0 32px;
      }
      figure { margin: 0 0 28px; }
      figure img {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 3px;
        opacity: 0.92;
      }
      footer {
        margin-top: 32px;
        font-size: 12px;
        color: var(--muted);
        letter-spacing: 0.01em;
      }
      footer a {
        color: var(--muted);
        text-decoration: none;
      }
      footer a:hover { color: var(--fg); }
      footer .sep { margin: 0 8px; color: var(--rule); }

      @media (max-width: 560px) {
        main { padding: 48px 22px 72px; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="brand">
        <img src="/ara_logo.svg" alt="" />
        <span>Ara Engineer</span>
      </div>

      <p class="intro">
        <code>ae</code> is the engineering console for Ara — worktrees, dev envs, and agent-friendly skills, one command away.
      </p>

      <p>Install:</p>

      <div class="install">
        <span id="install-cmd">curl -fsSL https://ara.engineer/install | sh</span>
        <button class="copy" id="copy-btn" aria-label="Copy">copy</button>
      </div>

      <p class="muted">Requires <code>bun</code> and <code>git</code>. Installs <code>ae</code> to <code>~/.bun/bin</code>.</p>

      <hr />

      <figure>
        <img src="/img2.png" alt="" />
      </figure>

      <footer>
        <a href="/install">install script</a>
        <span class="sep">·</span>
        <a href="https://github.com/Aradotso/ara.engineer">github</a>
        <span class="sep">·</span>
        <a href="https://ara.so">ara.so</a>
      </footer>
    </main>

    <script>
      const btn = document.getElementById("copy-btn");
      const cmd = document.getElementById("install-cmd");
      btn.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(cmd.textContent);
          btn.textContent = "copied";
          btn.classList.add("ok");
          setTimeout(() => { btn.textContent = "copy"; btn.classList.remove("ok"); }, 1400);
        } catch {
          const r = document.createRange();
          r.selectNode(cmd);
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(r);
        }
      });
    </script>
  </body>
</html>
